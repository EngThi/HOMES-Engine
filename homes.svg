<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">HOMES ecosystem architecture banner</title>
  <desc id="desc">Terminal-first HOMES ecosystem diagram showing HOMES Hub, MCP, HOMES-Engine, VideoLM, telemetry, profiles, HMAC, and public artifacts.</desc>
  <defs>
    <radialGradient id="coreGlow" cx="52%" cy="48%" r="50%">
      <stop offset="0" stop-color="#9bf2ff" stop-opacity="0.55"/>
      <stop offset="0.25" stop-color="#25d9ff" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="#07111b" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#03070d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#03070d"/>
      <stop offset="0.48" stop-color="#07111b"/>
      <stop offset="1" stop-color="#120b16"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" x2="1200" y1="90" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25d9ff"/>
      <stop offset="0.36" stop-color="#35f69b"/>
      <stop offset="0.68" stop-color="#ffbd45"/>
      <stop offset="1" stop-color="#ff4fd8"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-22%" width="136%" height="144%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#75dfff" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#25d9ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#35f69b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#ffbd45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="#03070d" opacity="0.18"/>
  <circle cx="690" cy="322" r="390" fill="url(#coreGlow)"/>
  <path d="M0 508C142 438 282 456 418 498C588 550 738 480 880 398C1032 310 1142 330 1280 284V640H0V508Z" fill="url(#accent)" opacity="0.12"/>
  <path d="M-40 124C120 52 286 82 438 148C588 214 734 180 900 102C1046 34 1166 44 1320 18" fill="none" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.46"/>

  <g transform="translate(58 58)" filter="url(#shadow)">
    <rect x="0" y="0" width="1164" height="520" rx="24" fill="#050a12" fill-opacity="0.78" stroke="url(#accent)" stroke-opacity="0.36"/>
    <rect x="0" y="0" width="1164" height="50" rx="24" fill="#07111b"/>
    <path d="M0 24C0 10.745 10.745 0 24 0H1140C1153.25 0 1164 10.745 1164 24V50H0V24Z" fill="#07111b"/>
    <circle cx="34" cy="25" r="7" fill="#ff5f68"/>
    <circle cx="60" cy="25" r="7" fill="#ffbd45"/>
    <circle cx="86" cy="25" r="7" fill="#35f69b"/>
    <text x="120" y="32" fill="#9bf2ff" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16">chefthi@homes:~$ homes-start --hub --mcp --engine --videolm</text>
  </g>

  <g transform="translate(96 122)">
    <text x="0" y="0" fill="#35f69b" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="22">$ python main.py mode 99</text>
    <text x="0" y="60" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="66" font-weight="900">HOMES</text>
    <text x="0" y="104" fill="#d9f8ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="800">Hub + MCP + Engine ecosystem</text>
    <text x="2" y="138" fill="#8fb1c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Modular runtime for profiles, telemetry, jobs, tools, sensors, and public artifacts.</text>
  </g>

  <g transform="translate(92 334)" filter="url(#shadow)">
    <rect width="318" height="128" rx="16" fill="#050b12" fill-opacity="0.86" stroke="#25d9ff" stroke-opacity="0.34"/>
    <text x="24" y="38" fill="#9bf2ff" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16">MCP tool plane</text>
    <text x="24" y="78" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="850">28 tools exposed</text>
    <text x="24" y="108" fill="#8fb1c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">jobs, capabilities, state, outputs, health</text>
  </g>

  <g transform="translate(548 248)" filter="url(#glow)">
    <circle r="150" fill="none" stroke="#9bf2ff" stroke-opacity="0.36" stroke-width="2"/>
    <circle r="116" fill="none" stroke="#35f69b" stroke-opacity="0.24" stroke-width="2" stroke-dasharray="12 10"/>
    <path d="M-104 -50H104L146 0 104 50H-104L-146 0Z" fill="#061522" fill-opacity="0.92" stroke="#9bf2ff" stroke-opacity="0.66" stroke-width="2"/>
    <text x="0" y="-8" text-anchor="middle" fill="#ecfbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="900" letter-spacing="9">HOMES</text>
    <text x="0" y="28" text-anchor="middle" fill="#c7f8ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="900">HUB CONTROL PLANE</text>
    <text x="0" y="-126" text-anchor="middle" fill="#d9f8ff" fill-opacity="0.74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="2">QUEUE + DASHBOARD</text>
    <text x="-146" y="5" text-anchor="middle" transform="rotate(-90 -146 5)" fill="#d9f8ff" fill-opacity="0.7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="2">HMAC</text>
    <text x="146" y="5" text-anchor="middle" transform="rotate(90 146 5)" fill="#d9f8ff" fill-opacity="0.7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="2">TELEMETRY</text>
  </g>

  <g transform="translate(820 140)" filter="url(#shadow)">
    <rect width="330" height="142" rx="16" fill="#06101a" fill-opacity="0.88" stroke="#35f69b" stroke-opacity="0.38"/>
    <text x="24" y="38" fill="#35f69b" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16">HOMES-Engine</text>
    <text x="24" y="78" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="850">execution plane</text>
    <text x="24" y="110" fill="#9fb9ca" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">workers, modules, profile, state, recipes</text>
  </g>

  <g transform="translate(820 326)" filter="url(#shadow)">
    <rect width="330" height="120" rx="16" fill="#100b16" fill-opacity="0.9" stroke="#ff4fd8" stroke-opacity="0.34"/>
    <text x="24" y="38" fill="#ffb3ef" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="16">VideoLM</text>
    <text x="24" y="78" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="850">artifact factory</text>
    <text x="24" y="106" fill="#c9a7c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">video, image, report, quiz, slides, table</text>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M410 394C462 352 504 310 526 262" stroke="#25d9ff" stroke-width="4" marker-end="url(#arrowCyan)"/>
    <path d="M698 230C744 190 774 174 820 176" stroke="#35f69b" stroke-width="4" marker-end="url(#arrowGreen)"/>
    <path d="M984 282V326" stroke="#ffbd45" stroke-width="4" marker-end="url(#arrowAmber)"/>
    <path d="M820 386C744 400 690 360 646 314" stroke="#25d9ff" stroke-width="4" marker-end="url(#arrowCyan)" opacity="0.86"/>
  </g>

  <g transform="translate(96 508)">
    <rect x="0" y="0" width="142" height="34" rx="17" fill="#25d9ff" fill-opacity="0.15" stroke="#25d9ff" stroke-opacity="0.48"/>
    <text x="21" y="23" fill="#c5f7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">28 MCP tools</text>
    <rect x="158" y="0" width="158" height="34" rx="17" fill="#35f69b" fill-opacity="0.14" stroke="#35f69b" stroke-opacity="0.48"/>
    <text x="181" y="23" fill="#d7ffe9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">19 capabilities</text>
    <rect x="332" y="0" width="154" height="34" rx="17" fill="#ffbd45" fill-opacity="0.15" stroke="#ffbd45" stroke-opacity="0.48"/>
    <text x="355" y="23" fill="#fff2cc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">9 artifact types</text>
    <rect x="502" y="0" width="188" height="34" rx="17" fill="#ff4fd8" fill-opacity="0.12" stroke="#ff4fd8" stroke-opacity="0.42"/>
    <text x="526" y="23" fill="#ffe2f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="850">public artifact URLs</text>
  </g>
</svg>
