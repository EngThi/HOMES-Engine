<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HOMES ecosystem Flavortown banner</title>
  <desc id="desc">A terminal-first architecture banner showing HOMES Hub, MCP, HOMES-Engine, VideoLM, telemetry, profiles, and artifact URLs.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#03070D"/>
      <stop offset="0.45" stop-color="#07111B"/>
      <stop offset="1" stop-color="#181018"/>
    </linearGradient>
    <linearGradient id="edge" x1="132" y1="83" x2="1468" y2="435" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25D9FF"/>
      <stop offset="0.35" stop-color="#35F69B"/>
      <stop offset="0.68" stop-color="#FFBD45"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <linearGradient id="hubFill" x1="538" y1="118" x2="1062" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D2A3A"/>
      <stop offset="0.5" stop-color="#07111B"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-22%" width="136%" height="144%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#25D9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#35F69B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#FFBD45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" fill="url(#grid)"/>
  <path d="M0 414C148 364 268 406 410 430C610 464 702 374 850 326C1066 256 1242 341 1600 266V520H0V414Z" fill="url(#edge)" opacity="0.13"/>
  <path d="M-30 108C176 40 354 88 520 144C676 196 805 150 976 90C1184 18 1362 38 1640 8" stroke="url(#edge)" stroke-width="3" stroke-opacity="0.45"/>
  <path d="M-40 392C140 342 289 371 450 417C638 471 766 430 924 340C1110 234 1288 250 1630 188" stroke="#25D9FF" stroke-width="2" stroke-opacity="0.22"/>

  <g filter="url(#shadow)">
    <rect x="112" y="70" width="1376" height="380" rx="26" fill="#050A12" stroke="url(#edge)" stroke-opacity="0.45"/>
    <rect x="112" y="70" width="1376" height="52" rx="26" fill="#07111B"/>
    <path d="M112 96C112 81.641 123.641 70 138 70H1462C1476.36 70 1488 81.641 1488 96V122H112V96Z" fill="#07111B"/>
    <circle cx="152" cy="96" r="7" fill="#FF5F68"/>
    <circle cx="178" cy="96" r="7" fill="#FFBD45"/>
    <circle cx="204" cy="96" r="7" fill="#35F69B"/>
    <text x="238" y="102" fill="#9BF2FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">chefthi@homes:~$ homes-start --mcp --engine --artifacts</text>
  </g>

  <g transform="translate(150 154)">
    <text x="0" y="0" fill="#35F69B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23">$ python main.py mode 99</text>
    <text x="0" y="58" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="74" font-weight="850">HOMES Ecosystem</text>
    <text x="2" y="102" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="650">Hub control plane + MCP tools + modular Engine runtime</text>
    <text x="2" y="140" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="21">Profiles, recipes, telemetry, jobs, sensors, artifacts, and public reviewer outputs</text>
    <g transform="translate(0 174)">
      <rect x="0" y="0" width="158" height="38" rx="19" fill="#25D9FF" fill-opacity="0.16" stroke="#25D9FF" stroke-opacity="0.56"/>
      <text x="22" y="25" fill="#C5F7FF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">HMAC signed</text>
      <rect x="176" y="0" width="132" height="38" rx="19" fill="#35F69B" fill-opacity="0.14" stroke="#35F69B" stroke-opacity="0.52"/>
      <text x="204" y="25" fill="#D7FFE9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">28 tools</text>
      <rect x="326" y="0" width="176" height="38" rx="19" fill="#FFBD45" fill-opacity="0.16" stroke="#FFBD45" stroke-opacity="0.5"/>
      <text x="351" y="25" fill="#FFF2CC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">19 capabilities</text>
      <rect x="520" y="0" width="186" height="38" rx="19" fill="#FF4FD8" fill-opacity="0.13" stroke="#FF4FD8" stroke-opacity="0.44"/>
      <text x="544" y="25" fill="#FFE2F7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">9 artifact types</text>
    </g>
  </g>

  <g transform="translate(1130 132)" filter="url(#shadow)">
    <rect x="0" y="0" width="270" height="132" rx="18" fill="url(#hubFill)" stroke="#9BF2FF" stroke-opacity="0.34"/>
    <text x="20" y="32" fill="#9BF2FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10">https://homes.chefthi.hackclub.app</text>
    <text x="20" y="68" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="850">HOMES Hub</text>
    <text x="20" y="94" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">control plane, queue, telemetry, dashboard</text>
    <g transform="translate(20 106)">
      <rect x="0" y="0" width="70" height="22" rx="17" fill="#020617" stroke="#25D9FF" stroke-opacity="0.36"/>
      <text x="14" y="15" fill="#C5F7FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10">/mcp</text>
      <rect x="80" y="0" width="78" height="22" rx="17" fill="#020617" stroke="#35F69B" stroke-opacity="0.36"/>
      <text x="92" y="15" fill="#D7FFE9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10">/jobs</text>
      <rect x="168" y="0" width="70" height="22" rx="17" fill="#020617" stroke="#FFBD45" stroke-opacity="0.38"/>
      <text x="180" y="15" fill="#FFF2CC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10">/telemetry</text>
    </g>
  </g>

  <g transform="translate(1088 146)" filter="url(#shadow)">
    <rect x="0" y="0" width="318" height="128" rx="20" fill="#06101A" stroke="#35F69B" stroke-opacity="0.36"/>
    <text x="24" y="34" fill="#35F69B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">HOMES-Engine</text>
    <text x="24" y="72" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="820">execution plane</text>
    <text x="24" y="102" fill="#9FB3C8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">workers, modules, profile, state</text>
  </g>

  <g transform="translate(1088 308)" filter="url(#shadow)">
    <rect x="0" y="0" width="318" height="102" rx="20" fill="#100B16" stroke="#FF4FD8" stroke-opacity="0.34"/>
    <text x="24" y="33" fill="#FFB3EF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">VideoLM</text>
    <text x="24" y="68" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="820">artifact factory</text>
  </g>

  <g transform="translate(1214 438)">
    <rect x="0" y="-34" width="196" height="38" rx="19" fill="#020617" stroke="#FFBD45" stroke-opacity="0.48"/>
    <text x="21" y="-10" fill="#FFF2CC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">videos/*.mp4 + PNG</text>
  </g>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M1030 222C1058 210 1074 204 1088 204" stroke="#35F69B" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <path d="M1248 274V308" stroke="#FFBD45" stroke-width="3" marker-end="url(#arrowAmber)"/>
    <path d="M1088 358C1062 356 1046 342 1030 324" stroke="#25D9FF" stroke-width="3" marker-end="url(#arrowCyan)"/>
    <path d="M570 294C488 292 446 262 410 224" stroke="#25D9FF" stroke-width="3" marker-end="url(#arrowCyan)" opacity="0.9"/>
    <path d="M1214 404C1164 420 1078 424 982 398" stroke="#FF4FD8" stroke-width="3" marker-end="url(#arrowAmber)" opacity="0.85"/>
  </g>

  <g transform="translate(1198 118)">
    <circle cx="0" cy="0" r="4" fill="#25D9FF"/>
    <circle cx="72" cy="24" r="3" fill="#35F69B"/>
    <circle cx="166" cy="-4" r="4" fill="#FFBD45"/>
    <circle cx="228" cy="44" r="3" fill="#FF4FD8"/>
  </g>

  <g transform="translate(586 394)">
    <text x="0" y="0" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">ecosystem:</text>
    <text x="132" y="0" fill="#C5F7FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">MCP tools</text>
    <text x="282" y="0" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">-&gt;</text>
    <text x="314" y="0" fill="#D7FFE9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Hub</text>
    <text x="356" y="0" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">-&gt;</text>
    <text x="388" y="0" fill="#FFF2CC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Engine</text>
    <text x="452" y="0" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">-&gt;</text>
    <text x="484" y="0" fill="#FFE2F7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">artifact URL</text>
  </g>
</svg>
