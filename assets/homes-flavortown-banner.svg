    <path d="M0 36H172" stroke="#FACC15" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 18H108" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 0H142" stroke="#F43F5E" stroke-width="4" stroke-linecap="round"/>
