<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HOMES Engine Flavortown banner</title>
  <desc id="desc">A terminal-first AI video orchestration banner for the HOMES Engine project at Flavortown.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0F1F"/>
      <stop offset="0.45" stop-color="#121826"/>
      <stop offset="1" stop-color="#22140B"/>
    </linearGradient>

    <linearGradient id="heat" x1="180" y1="455" x2="1420" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FACC15"/>
      <stop offset="0.38" stop-color="#FB923C"/>
      <stop offset="0.72" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <linearGradient id="panel" x1="226" y1="92" x2="1322" y2="435" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" fill="url(#grid)"/>

  <path d="M0 424C168 376 258 470 432 430C632 384 654 255 850 250C1052 245 1100 386 1292 342C1418 313 1501 230 1600 246V520H0V424Z" fill="url(#heat)" opacity="0.18"/>
  <path d="M-60 128C116 66 265 92 413 145C583 206 706 158 858 89C1048 2 1270 42 1660 9" stroke="url(#heat)" stroke-width="4" stroke-opacity="0.45"/>
  <path d="M-30 405C116 363 215 382 335 420C500 472 622 430 756 342C929 228 1096 227 1256 282C1375 323 1481 327 1630 279" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.22"/>

  <g opacity="0.9">
    <circle cx="1336" cy="104" r="4" fill="#FACC15"/>
    <circle cx="1398" cy="154" r="3" fill="#38BDF8"/>
    <circle cx="1494" cy="96" r="5" fill="#FB923C"/>
    <circle cx="1218" cy="416" r="3" fill="#F43F5E"/>
    <circle cx="278" cy="92" r="4" fill="#38BDF8"/>
    <circle cx="130" cy="358" r="3" fill="#FACC15"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="166" y="88" width="1268" height="344" rx="28" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="166" y="88" width="1268" height="56" rx="28" fill="#0B1120"/>
    <path d="M166 116C166 100.536 178.536 88 194 88H1406C1421.46 88 1434 100.536 1434 116V144H166V116Z" fill="#0B1120"/>
    <circle cx="209" cy="116" r="8" fill="#F43F5E"/>
    <circle cx="238" cy="116" r="8" fill="#F59E0B"/>
    <circle cx="267" cy="116" r="8" fill="#22C55E"/>
    <text x="310" y="122" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="0">homes-engine --flavortown --renderer videolm</text>
  </g>

  <g transform="translate(214 174)">
    <text x="0" y="0" fill="#38BDF8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="25" letter-spacing="0">$ python main.py --demo-url</text>
    <text x="0" y="56" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="82" font-weight="800" letter-spacing="0">HOMES Engine</text>
    <text x="4" y="106" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="600" letter-spacing="0">Terminal-first AI video orchestration</text>
    <text x="4" y="151" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" letter-spacing="0">Hub jobs -> Engine worker -> VideoLM renders -> public MP4s</text>

    <g transform="translate(4 190)">
      <rect x="0" y="0" width="188" height="42" rx="21" fill="#FACC15"/>
      <text x="24" y="28" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="800" letter-spacing="0">Flavortown 2026</text>

      <rect x="210" y="0" width="156" height="42" rx="21" fill="#0F766E" fill-opacity="0.9" stroke="#5EEAD4" stroke-opacity="0.35"/>
      <text x="236" y="28" fill="#ECFEFF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="0">Hosted Demo</text>

      <rect x="388" y="0" width="154" height="42" rx="21" fill="#7C2D12" fill-opacity="0.9" stroke="#FDBA74" stroke-opacity="0.35"/>
      <text x="414" y="28" fill="#FFF7ED" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="0">NotebookLM</text>
    </g>
  </g>

  <g transform="translate(1022 162)">
    <rect x="0" y="0" width="292" height="186" rx="22" fill="#020617" stroke="#38BDF8" stroke-opacity="0.35"/>
    <rect x="20" y="20" width="252" height="36" rx="10" fill="#111827"/>
    <text x="38" y="45" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" letter-spacing="0">render_status.json</text>
    <text x="28" y="88" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="0">status: completed</text>
    <text x="28" y="122" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="0">progress: 100%</text>
    <text x="28" y="156" fill="#FCA5A5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="0">output: /videos/*.mp4</text>
  </g>

  <g transform="translate(1238 298)">
    <rect x="0" y="0" width="132" height="88" rx="18" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <path d="M52 24L92 44L52 64V24Z" fill="#F43F5E"/>
